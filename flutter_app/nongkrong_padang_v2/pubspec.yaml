name: nongkrong_padang
description: Sistem Rekomendasi Tempat Nongkrong Kota Padang
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP & API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1

  # Navigation
  go_router: ^13.0.1

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/